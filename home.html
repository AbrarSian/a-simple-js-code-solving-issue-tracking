<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker || Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    
    <!-- FavIcon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- google Font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind And Daisy UI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#FFFFFF]">
    <header class="max-w-[1600px] mx-auto">
        <div class="navbar bg-base-100 flex md:flex-row flex-col gap-5 shadow-sm w-fulll">
            <div class="flex-1">
              <div class="flex gap-2 items-center">
                <div class="h-9 w-9"><img src="./assets/github-logo.png" alt="" srcset=""></div>
                <h1 class="md:text-2xl text-xl font-medium md:font-semibold">GitHub Issues Tracker</h1>
              </div>
            </div>
            <div class="flex gap-3 items-center">
                <input type="text" id="search-issue-two" placeholder="Search" class="input input-bordered w-full md:w-[300px] md:h-10 h-8" />
                <button id="search-issue" class="btn bg-[#4a00ffFF] text-white md:h-10 h-8 md:px-4 px:2 py:1 md:py-2 font:medium md:font-semibold rounded-md">+ New Issue</button>
            </div>
        </div>
    </header>

    <main class="space-y-5 max-w-[1300px] mx-auto mt-[60px]">
        <div class="md:space-x-2 space-x-1">
            <button id="all-btn" onclick="loadAllIssues()" class="btn bg-[#4a00ffFF] text-white border rounded-md w-[60px] md:w-[120px] h-10">All</button>
            <button id="open-btn" onclick="loadSelectiveIssues('open')" class="btn  border  rounded-xl w-[60px] md:w-[120px] h-10">Open</button>
            <button id="closed-btn" onclick="loadSelectiveIssues('closed')"  class="btn  border rounded-xl w-[60px] md:w-[120px] h-10">Closed</button>
        </div>
        <div class="rounded-xl shadow-2xl flex justify-between items-center p-6">
            <div class="flex items-center justify-center gap-2">
                <div class="md:w-[50px] w-8 h-8 md:h-[50px]">
                    <img class="w-full h-full" src="./assets/Aperture.png" alt="">
                </div>
                <div class="flex flex-col gap-0">
                    <p class="issue-count md:font-semibold font-medium text-base md:text-xl"><span id="issue-count">50</span> Issues</p>
                    <p class="text-gray-500 md:font-semibold font-medium text-base md:text-xl">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="flex items-center gap-2"><p class="bg-green-700 h-3 w-3 rounded-full"></p>Open</div>
                <div class="flex items-center gap-2"><p class="bg-purple-700 h-3 w-3 rounded-full"></p>Closed</div>
            </div>
        </div>
        <section id="issue-container" class="shadow-2xl p-6 grid xl:grid-cols-4 lg:grid-cols-3 md:grid-cols-2 grid-cols-1 gap-3">
            
        </section>

        <div id="loadSpinner" class="h-[60vh] hidden justify-center items-center">
            <span class="loading loading-spinner loading-lg"></span>
        </div>

        <section id="modal-section" class="">
        
        </section>
    </main>

    <script src="./home.js"></script>    
</body>
</html>
